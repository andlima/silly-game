<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
  <title>Silly Roguelike (Sprite)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
    }
    body {
      background: #0a0a0a;
      color: #aaa;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }
    canvas { display: block; image-rendering: pixelated; touch-action: none; }
    #hud {
      margin-top: 8px;
      font-size: 16px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      border-top: 1px solid #222;
    }
    #hp-bar-container {
      position: relative;
      width: 160px;
      height: 18px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 2px;
      overflow: hidden;
    }
    #hp-bar-fill {
      height: 100%;
      transition: width 0.15s;
    }
    #hp-bar-text {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 2px #000, 0 0 4px #000;
    }
    #hud .level { color: #44aaff; font-weight: bold; }
    #hud .potions { color: #dd55cc; font-weight: bold; }
    #hud .equipment { color: #99bbdd; font-size: 13px; }
    #hud .mode { color: #888; font-size: 13px; }
    #messages {
      margin-top: 4px;
      font-size: 14px;
      text-align: left;
      width: 100%;
      max-width: 800px;
      padding: 0 20px;
      line-height: 1.4;
    }
    #messages .msg-line {
      color: #ccaa44;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }
    #overlay.visible { display: flex; }
    #overlay h1 { font-size: 48px; margin-bottom: 20px; }
    #overlay h1.game-over { color: #ff4444; }
    #overlay h1.win { color: #44ff44; }
    #overlay button {
      font-family: monospace;
      font-size: 20px;
      padding: 10px 30px;
      background: #333;
      color: #fff;
      border: 2px solid #888;
      cursor: pointer;
    }
    #overlay button:hover { background: #555; }

    /* Mobile action bar — hidden by default, shown on touch devices */
    #action-bar {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      justify-content: center;
      gap: 12px;
      padding: 10px 16px;
      background: #111;
      border-top: 1px solid #333;
      z-index: 5;
    }
    #action-bar button {
      font-family: monospace;
      font-size: 16px;
      min-width: 80px;
      min-height: 44px;
      padding: 8px 14px;
      background: #222;
      color: #ccc;
      border: 1px solid #444;
      border-radius: 4px;
      cursor: pointer;
      touch-action: manipulation;
    }
    #action-bar button:active { background: #444; }

    @media (pointer: coarse) {
      #action-bar { display: flex; }
    }

    @media (max-width: 600px) {
      #hud { font-size: 13px; gap: 8px; padding: 4px 8px; }
      #hud .equipment { font-size: 11px; }
      #hp-bar-container { width: 100px; }
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="hp-bar-container">
      <div id="hp-bar-fill"></div>
      <div id="hp-bar-text"></div>
    </div>
    <span class="level" id="hud-level"></span>
    <span class="potions" id="hud-potions"></span>
    <span class="equipment" id="hud-equipment"></span>
    <span class="mode" id="hud-mode"></span>
    <button id="mute-btn" style="font-family:monospace;font-size:16px;background:none;border:1px solid #444;color:#888;cursor:pointer;padding:2px 8px;border-radius:3px" title="Toggle sound">&#x1f50a;</button>
  </div>
  <div id="messages"></div>
  <div id="action-bar">
    <button id="btn-potion">Potion</button>
    <button id="btn-descend">Descend</button>
    <button id="btn-wait">Wait</button>
  </div>
  <div id="overlay">
    <h1 id="overlay-title">Game Over</h1>
    <button id="restart-btn">Restart</button>
  </div>
  <script type="module">
    import { createGame, dispatch, getVisibleTiles, FLOOR, WALL, STAIR, EQUIPMENT_TYPES } from './src/game.js';
    import { GLYPHS, GLYPHS_ENHANCED, GLYPHS_ASCII, getRenderMode, toggleRenderMode } from './src/glyphs.js';
    import { initAudio, setVolume, getVolume, playMove, playAttack, playHurt, playPickup, playDescend, playDeath, playVictory } from './src/audio.js';

    const TILE_SIZE = 56;
    const FONT_SIZE = 44;
    const EMOJI_FONT = '"Segoe UI Emoji", "Noto Color Emoji", "Apple Color Emoji", monospace';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const messagesEl = document.getElementById('messages');
    const overlayEl = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const restartBtn = document.getElementById('restart-btn');
    const modeEl = document.getElementById('hud-mode');

    let game = createGame();
    let minimapVisible = window.innerWidth >= 600;
    const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

    // --- Render mode: sprite / emoji / ascii ---
    // We manage our own 3-mode cycle independent of glyphs.js's 2-mode toggle.
    let renderMode = 'sprite'; // 'sprite' | 'emoji' | 'ascii'

    function cycleRenderMode() {
      if (renderMode === 'sprite') {
        renderMode = 'emoji';
        // Ensure glyphs.js is in enhanced mode
        if (getRenderMode() !== 'enhanced') toggleRenderMode();
      } else if (renderMode === 'emoji') {
        renderMode = 'ascii';
        // Switch glyphs.js to ascii mode
        if (getRenderMode() !== 'ascii') toggleRenderMode();
      } else {
        renderMode = 'sprite';
        // Reset glyphs.js to enhanced (default) for any text fallback needs
        if (getRenderMode() !== 'enhanced') toggleRenderMode();
      }
    }

    // --- Sprite sheet ---
    const spriteSheet = new Image();
    spriteSheet.src = 'assets/roguelike-sprites.png';
    let spriteReady = false;
    let cellW = 0, cellH = 0;

    spriteSheet.onload = () => {
      cellW = spriteSheet.width / 4;
      cellH = spriteSheet.height / 3;
      spriteReady = true;
      render();
    };

    // Sprite coordinate map: name -> { col, row }
    const SPRITE_MAP = {
      player:   { col: 0, row: 0 },
      potion:   { col: 1, row: 0 },
      rat:      { col: 2, row: 0 },
      skeleton: { col: 3, row: 0 },
      wall:     { col: 0, row: 1 },
      bear:     { col: 1, row: 1 },
      dragon:   { col: 2, row: 1 },
      stair:    { col: 3, row: 1 },
      dagger:   { col: 0, row: 2 },
      sword:    { col: 1, row: 2 },
      helmet:   { col: 2, row: 2 },
      shield:   { col: 3, row: 2 },
    };

    function drawSprite(name, px, py) {
      const s = SPRITE_MAP[name];
      if (!s || !spriteReady) return;
      ctx.drawImage(
        spriteSheet,
        s.col * cellW, s.row * cellH, cellW, cellH,
        px, py, TILE_SIZE, TILE_SIZE
      );
    }

    // --- Color helpers (same as index.html) ---
    const WALL_SHADES = ['#3a3a4a', '#40405a', '#4a4a5a'];
    const FLOOR_SHADES = ['#1a1a1a', '#1c1c1c', '#1e1e1e'];

    const COLORS = {
      bg:      '#0a0a0a',
      player:  '#ffcc00',
      playerBg:'#44380a',
      stair:   '#5599dd',
      potion:  '#dd55cc',
      dagger:  '#aaaaaa',
      sword:   '#dddddd',
      helmet:  '#88aacc',
      shield:  '#99bbdd',
    };

    const KEY_MAP = {
      ArrowUp:    'n', ArrowDown:  's', ArrowLeft:  'w', ArrowRight: 'e',
      w: 'n', W: 'n',
      s: 's', S: 's',
      a: 'w', A: 'w',
      d: 'e', D: 'e',
    };

    function getViewSize() {
      const actionBar = document.getElementById('action-bar');
      const actionBarH = actionBar && actionBar.offsetHeight > 0 ? actionBar.offsetHeight : 0;
      const cols = Math.floor((window.innerWidth - 40) / TILE_SIZE);
      const rows = Math.floor((window.innerHeight - 160 - actionBarH) / TILE_SIZE);
      return { cols: Math.max(10, cols), rows: Math.max(6, rows) };
    }

    function scaleColor(hex, factor) {
      const r = Math.round(parseInt(hex.slice(1, 3), 16) * factor);
      const g = Math.round(parseInt(hex.slice(3, 5), 16) * factor);
      const b = Math.round(parseInt(hex.slice(5, 7), 16) * factor);
      return `rgb(${Math.min(255,r)},${Math.min(255,g)},${Math.min(255,b)})`;
    }

    function revealedColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const grey = (r + g + b) / 3;
      const rr = Math.round(grey * 0.15 + 20);
      const gg = Math.round(grey * 0.15 + 25);
      const bb = Math.round(grey * 0.2 + 40);
      return `rgb(${rr},${gg},${bb})`;
    }

    function wallShade(x, y) {
      return WALL_SHADES[(x * 7 + y * 13) % 3];
    }

    function floorShade(x, y) {
      return FLOOR_SHADES[(x * 7 + y * 13) % 3];
    }

    // --- Rendering ---

    function renderSpriteMode(visible) {
      for (let vy = 0; vy < visible.length; vy++) {
        for (let vx = 0; vx < visible[vy].length; vx++) {
          const cell = visible[vy][vx];
          const px = vx * TILE_SIZE;
          const py = vy * TILE_SIZE;
          const mx = cell.x;
          const my = cell.y;

          if (cell.visibility === 'hidden') continue;

          if (cell.visibility === 'revealed') {
            // Dim, desaturated rendering for revealed-but-not-visible tiles
            if (cell.tile === WALL) {
              ctx.save();
              ctx.globalAlpha = 0.3;
              ctx.filter = 'grayscale(100%)';
              // Dark floor background first
              ctx.fillStyle = '#1a1a1a';
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
              drawSprite('wall', px, py);
              ctx.restore();
            } else if (cell.tile === STAIR) {
              ctx.fillStyle = '#1a1a1a';
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
              ctx.save();
              ctx.globalAlpha = 0.3;
              ctx.filter = 'grayscale(100%)';
              drawSprite('stair', px, py);
              ctx.restore();
            } else if (cell.tile === FLOOR) {
              ctx.fillStyle = '#1a1a1a';
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            }
            continue;
          }

          // Visible tiles — apply brightness via globalAlpha
          const b = cell.brightness;

          // Floor background for all walkable tiles
          if (cell.tile === FLOOR || cell.tile === STAIR) {
            ctx.fillStyle = scaleColor(floorShade(mx, my), b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
          }

          ctx.save();
          ctx.globalAlpha = b;

          if (cell.isPlayer) {
            drawSprite('player', px, py);
          } else if (cell.monster) {
            drawSprite(cell.monster.type, px, py);
          } else if (cell.item) {
            drawSprite(cell.item.type, px, py);
          } else if (cell.tile === WALL) {
            drawSprite('wall', px, py);
          } else if (cell.tile === STAIR) {
            drawSprite('stair', px, py);
          }

          ctx.restore();
        }
      }
    }

    function renderTextMode(visible) {
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      for (let vy = 0; vy < visible.length; vy++) {
        for (let vx = 0; vx < visible[vy].length; vx++) {
          const cell = visible[vy][vx];
          const px = vx * TILE_SIZE;
          const py = vy * TILE_SIZE;
          const cx = px + TILE_SIZE / 2;
          const cy = py + TILE_SIZE / 2;
          const mx = cell.x;
          const my = cell.y;

          if (cell.visibility === 'hidden') continue;

          if (cell.visibility === 'revealed') {
            if (cell.tile === WALL) {
              ctx.fillStyle = revealedColor(wallShade(mx, my));
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            } else if (cell.tile === STAIR) {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = revealedColor(COLORS.stair);
              ctx.fillText(GLYPHS.stair.char, cx, cy);
            } else if (cell.tile === FLOOR) {
              ctx.fillStyle = revealedColor(floorShade(mx, my));
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            }
            continue;
          }

          const b = cell.brightness;

          if (cell.tile === FLOOR || cell.tile === STAIR) {
            ctx.fillStyle = scaleColor(floorShade(mx, my), b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
          }

          if (cell.isPlayer) {
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.fillStyle = scaleColor(COLORS.playerBg, b);
            ctx.fillRect(px - 1, py - 1, TILE_SIZE + 2, TILE_SIZE + 2);
            ctx.fillStyle = scaleColor(COLORS.player, b);
            ctx.fillText(GLYPHS.player.char, cx, cy);
          } else if (cell.monster) {
            const glyph = GLYPHS[cell.monster.type];
            if (glyph && glyph.wide) {
              ctx.font = `${FONT_SIZE - 2}px ${EMOJI_FONT}`;
              ctx.fillText(glyph.char, cx, cy);
            } else {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = scaleColor(cell.monster.color, Math.min(1, b * 1.15));
              ctx.fillText((glyph || { char: cell.monster.char }).char, cx, cy);
            }
          } else if (cell.item) {
            const glyph = GLYPHS[cell.item.type];
            if (glyph && glyph.wide) {
              ctx.font = `${FONT_SIZE - 2}px ${EMOJI_FONT}`;
              ctx.fillText(glyph.char, cx, cy);
            } else {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = scaleColor(cell.item.color, b);
              ctx.fillText((glyph || { char: cell.item.char }).char, cx, cy);
            }
          } else if (cell.tile === WALL) {
            ctx.fillStyle = scaleColor(wallShade(mx, my), b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
          } else if (cell.tile === STAIR) {
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.fillStyle = scaleColor(COLORS.stair, b);
            ctx.fillText(GLYPHS.stair.char, cx, cy);
          }
        }
      }
    }

    function render() {
      const { cols, rows } = getViewSize();
      canvas.width = cols * TILE_SIZE;
      canvas.height = rows * TILE_SIZE;

      const visible = getVisibleTiles(game, cols, rows);

      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (renderMode === 'sprite') {
        renderSpriteMode(visible);
      } else {
        renderTextMode(visible);
      }

      // Minimap overlay
      if (minimapVisible) {
        const MINIMAP_SCALE = 3;
        const mapW = game.map.width;
        const mapH = game.map.height;
        const scaledW = mapW * MINIMAP_SCALE;
        const scaledH = mapH * MINIMAP_SCALE;
        const margin = 10;
        const border = 1;
        const mmX = canvas.width - scaledW - margin - border * 2;
        const mmY = margin;

        ctx.fillStyle = '#111';
        ctx.fillRect(mmX - border, mmY - border, scaledW + border * 2, scaledH + border * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(mmX, mmY, scaledW, scaledH);

        for (let y = 0; y < mapH; y++) {
          for (let x = 0; x < mapW; x++) {
            if (!game.revealed[y][x]) continue;

            const inFOV = game.fov.has(`${x},${y}`);
            const tile = game.map.tiles[y][x];

            if (x === game.player.x && y === game.player.y) {
              ctx.fillStyle = '#ffcc00';
            } else if (inFOV && game.monsters.some(m => m.x === x && m.y === y)) {
              ctx.fillStyle = '#cc3333';
            } else if (tile === STAIR) {
              ctx.fillStyle = '#5599dd';
            } else if (inFOV) {
              ctx.fillStyle = tile === WALL ? '#999' : '#555';
            } else {
              ctx.fillStyle = tile === WALL ? '#666' : '#333';
            }

            ctx.fillRect(mmX + x * MINIMAP_SCALE, mmY + y * MINIMAP_SCALE, MINIMAP_SCALE, MINIMAP_SCALE);
          }
        }
      }

      // HUD: HP bar
      const hp = game.player.hp;
      const maxHp = game.player.maxHp;
      const pct = maxHp > 0 ? hp / maxHp : 0;
      const hpFill = document.getElementById('hp-bar-fill');
      const hpText = document.getElementById('hp-bar-text');
      let barColor;
      if (pct > 0.6) barColor = '#44aa44';
      else if (pct > 0.3) barColor = '#ccaa22';
      else barColor = '#cc3333';
      hpFill.style.width = `${Math.round(pct * 100)}%`;
      hpFill.style.background = barColor;
      hpText.textContent = `${hp}/${maxHp}`;

      document.getElementById('hud-level').textContent = `Level: ${game.level}`;
      document.getElementById('hud-potions').textContent = `Potions: ${game.inventory.potions}`;

      const eq = game.equipment;
      const weaponStr = eq.weapon ? `${eq.weapon.name} +${eq.weapon.bonus}atk` : '\u2014';
      const helmetStr = eq.helmet ? `${eq.helmet.name} +${eq.helmet.bonus}def` : '\u2014';
      const shieldStr = eq.shield ? `${eq.shield.name} +${eq.shield.bonus}def` : '\u2014';
      document.getElementById('hud-equipment').textContent =
        `Weapon: ${weaponStr} | Helmet: ${helmetStr} | Shield: ${shieldStr}`;

      const modeLabels = { sprite: '[sprite]', emoji: '[emoji]', ascii: '[ASCII]' };
      modeEl.textContent = modeLabels[renderMode];

      // Messages with transparency fade
      const msgs = game.messages;
      let msgHtml = '';
      for (let i = 0; i < msgs.length; i++) {
        const age = msgs.length - 1 - i;
        const opacity = Math.max(0.4, 1.0 - age * 0.15);
        msgHtml += `<div class="msg-line" style="opacity:${opacity}">${msgs[i]}</div>`;
      }
      messagesEl.innerHTML = msgHtml;

      if (game.gameOver) {
        overlayTitle.textContent = 'Game Over';
        overlayTitle.className = 'game-over';
        overlayEl.classList.add('visible');
      } else if (game.won) {
        overlayTitle.textContent = 'You Win!';
        overlayTitle.className = 'win';
        overlayEl.classList.add('visible');
      } else {
        overlayEl.classList.remove('visible');
      }
    }

    let audioReady = false;

    function playAudioForDiff(oldGame, newGame) {
      if (!audioReady) return;
      if (newGame.won && !oldGame.won) { playVictory(); return; }
      if (newGame.gameOver && !oldGame.gameOver) { playDeath(); return; }
      if (newGame.level > oldGame.level) { playDescend(); return; }
      if (newGame.player.hp < oldGame.player.hp) playHurt();
      if (newGame.level === oldGame.level) {
        const oldMonsters = new Map(oldGame.monsters.map(m => [m.id !== undefined ? m.id : `${m.x},${m.y}`, m]));
        for (const nm of newGame.monsters) {
          const key = nm.id !== undefined ? nm.id : `${nm.x},${nm.y}`;
          const om = oldMonsters.get(key);
          if (om && nm.hp < om.hp) { playAttack(); break; }
        }
        if (newGame.monsters.length < oldGame.monsters.length) playAttack();
      }
      if (newGame.inventory.potions > oldGame.inventory.potions ||
          (newGame.items && oldGame.items && newGame.items.length < oldGame.items.length)) {
        playPickup();
      }
      if (newGame.player.x !== oldGame.player.x || newGame.player.y !== oldGame.player.y) playMove();
    }

    function dispatchAndPlay(action) {
      const oldGame = game;
      game = dispatch(game, action);
      playAudioForDiff(oldGame, game);
      render();
    }

    document.addEventListener('keydown', (e) => {
      if (!audioReady) {
        initAudio();
        audioReady = true;
      }

      // Tab toggles render mode even during game over/win
      if (e.key === 'Tab') {
        e.preventDefault();
        cycleRenderMode();
        render();
        return;
      }

      // 'm' toggles minimap visibility
      if (e.key === 'm' || e.key === 'M') {
        e.preventDefault();
        minimapVisible = !minimapVisible;
        render();
        return;
      }

      // 'n' toggles sound mute/unmute
      if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        if (getVolume() > 0) {
          savedVolume = getVolume();
          setVolume(0);
          muteBtn.textContent = '\u{1f507}';
        } else {
          setVolume(savedVolume);
          muteBtn.textContent = '\u{1f50a}';
        }
        return;
      }

      // 'r' restarts the game
      if (e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        game = dispatch(game, { type: 'restart' });
        render();
        return;
      }

      if (game.gameOver || game.won) return;

      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        dispatchAndPlay({ type: 'move', dir });
        return;
      }

      if (e.key === '.' || e.key === '>') {
        e.preventDefault();
        dispatchAndPlay({ type: 'descend' });
        return;
      }

      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        dispatchAndPlay({ type: 'usePotion' });
        return;
      }

      if (e.key === '5') {
        e.preventDefault();
        dispatchAndPlay({ type: 'wait' });
      }
    });

    // Mute toggle
    const muteBtn = document.getElementById('mute-btn');
    let savedVolume = 0.5;
    muteBtn.addEventListener('click', () => {
      if (!audioReady) { initAudio(); audioReady = true; }
      if (getVolume() > 0) {
        savedVolume = getVolume();
        setVolume(0);
        muteBtn.textContent = '\u{1f507}';
      } else {
        setVolume(savedVolume);
        muteBtn.textContent = '\u{1f50a}';
      }
    });

    // --- Touch / swipe controls ---
    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (!audioReady) { initAudio(); audioReady = true; }
      const touch = e.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      e.preventDefault();
      if (game.gameOver || game.won) return;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;
      const absDx = Math.abs(dx);
      const absDy = Math.abs(dy);
      const threshold = 30;
      if (absDx < threshold && absDy < threshold) return; // tap, ignore
      if (absDx > absDy) {
        dispatchAndPlay({ type: 'move', dir: dx > 0 ? 'e' : 'w' });
      } else {
        dispatchAndPlay({ type: 'move', dir: dy > 0 ? 's' : 'n' });
      }
    }, { passive: false });

    // --- Action bar buttons ---
    document.getElementById('btn-potion').addEventListener('click', () => {
      if (!audioReady) { initAudio(); audioReady = true; }
      if (game.gameOver || game.won) return;
      dispatchAndPlay({ type: 'usePotion' });
    });
    document.getElementById('btn-descend').addEventListener('click', () => {
      if (!audioReady) { initAudio(); audioReady = true; }
      if (game.gameOver || game.won) return;
      dispatchAndPlay({ type: 'descend' });
    });
    document.getElementById('btn-wait').addEventListener('click', () => {
      if (!audioReady) { initAudio(); audioReady = true; }
      if (game.gameOver || game.won) return;
      dispatchAndPlay({ type: 'wait' });
    });

    restartBtn.addEventListener('click', () => {
      game = dispatch(game, { type: 'restart' });
      render();
    });

    window.addEventListener('resize', render);
    render();
  </script>
</body>
</html>
