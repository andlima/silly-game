<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Roguelike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #aaa;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }
    canvas { display: block; image-rendering: pixelated; }
    #hud {
      margin-top: 8px;
      font-size: 16px;
      color: #888;
    }
    #hud .hp { color: #ff4444; font-weight: bold; }
    #messages {
      margin-top: 4px;
      font-size: 14px;
      color: #ccaa44;
      text-align: left;
      width: 100%;
      max-width: 800px;
      padding: 0 20px;
      line-height: 1.4;
    }
    #game-over {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }
    #game-over.visible { display: flex; }
    #game-over h1 { color: #ff4444; font-size: 48px; margin-bottom: 20px; }
    #game-over button {
      font-family: monospace;
      font-size: 20px;
      padding: 10px 30px;
      background: #333;
      color: #fff;
      border: 2px solid #888;
      cursor: pointer;
    }
    #game-over button:hover { background: #555; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud"></div>
  <div id="messages"></div>
  <div id="game-over">
    <h1>Game Over</h1>
    <button id="restart-btn">Restart</button>
  </div>
  <script type="module">
    import { createGame, dispatch, getVisibleTiles, FLOOR, WALL } from './src/game.js';

    const TILE_SIZE = 18;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const messagesEl = document.getElementById('messages');
    const gameOverEl = document.getElementById('game-over');
    const restartBtn = document.getElementById('restart-btn');

    let game = createGame();

    const COLORS = {
      bg:     '#000000',
      wall:   '#aaaaaa',
      floor:  '#225522',
      player: '#ffdd00',
      floorChar: '#33aa33',
    };

    const KEY_MAP = {
      ArrowUp:    'n', ArrowDown:  's', ArrowLeft:  'w', ArrowRight: 'e',
      w: 'n', W: 'n',
      s: 's', S: 's',
      a: 'w', A: 'w',
      d: 'e', D: 'e',
    };

    function getViewSize() {
      const cols = Math.floor((window.innerWidth - 40) / TILE_SIZE);
      const rows = Math.floor((window.innerHeight - 160) / TILE_SIZE);
      return { cols: Math.max(10, cols), rows: Math.max(6, rows) };
    }

    function render() {
      const { cols, rows } = getViewSize();
      canvas.width = cols * TILE_SIZE;
      canvas.height = rows * TILE_SIZE;

      const visible = getVisibleTiles(game, cols, rows);

      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = `${TILE_SIZE - 2}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      for (let vy = 0; vy < visible.length; vy++) {
        for (let vx = 0; vx < visible[vy].length; vx++) {
          const cell = visible[vy][vx];
          const px = vx * TILE_SIZE;
          const py = vy * TILE_SIZE;

          if (cell.isPlayer) {
            ctx.fillStyle = COLORS.player;
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = '#000';
            ctx.fillText('@', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          } else if (cell.monster) {
            ctx.fillStyle = cell.monster.color;
            ctx.fillText(cell.monster.char, px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          } else if (cell.tile === WALL) {
            ctx.fillStyle = '#333';
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = COLORS.wall;
            ctx.fillText('#', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          } else if (cell.tile === FLOOR) {
            ctx.fillStyle = COLORS.floorChar;
            ctx.fillText('.', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          }
        }
      }

      hud.innerHTML = `<span class="hp">HP: ${game.player.hp}/${game.player.maxHp}</span>`;
      messagesEl.textContent = game.messages.join('\n');

      if (game.gameOver) {
        gameOverEl.classList.add('visible');
      } else {
        gameOverEl.classList.remove('visible');
      }
    }

    document.addEventListener('keydown', (e) => {
      if (game.gameOver) return;

      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        game = dispatch(game, { type: 'move', dir });
        render();
        return;
      }

      if (e.key === '.' || e.key === '5') {
        e.preventDefault();
        game = dispatch(game, { type: 'wait' });
        render();
      }
    });

    restartBtn.addEventListener('click', () => {
      game = dispatch(game, { type: 'restart' });
      render();
    });

    window.addEventListener('resize', render);
    render();
  </script>
</body>
</html>
