<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Roguelike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #aaa;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }
    canvas { display: block; image-rendering: pixelated; }
    #hud {
      margin-top: 8px;
      font-size: 16px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      border-top: 1px solid #222;
    }
    #hp-bar-container {
      position: relative;
      width: 160px;
      height: 18px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 2px;
      overflow: hidden;
    }
    #hp-bar-fill {
      height: 100%;
      transition: width 0.15s;
    }
    #hp-bar-text {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 2px #000, 0 0 4px #000;
    }
    #hud .level { color: #44aaff; font-weight: bold; }
    #hud .potions { color: #dd55cc; font-weight: bold; }
    #hud .mode { color: #888; font-size: 13px; }
    #messages {
      margin-top: 4px;
      font-size: 14px;
      text-align: left;
      width: 100%;
      max-width: 800px;
      padding: 0 20px;
      line-height: 1.4;
    }
    #messages .msg-line {
      color: #ccaa44;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }
    #overlay.visible { display: flex; }
    #overlay h1 { font-size: 48px; margin-bottom: 20px; }
    #overlay h1.game-over { color: #ff4444; }
    #overlay h1.win { color: #44ff44; }
    #overlay button {
      font-family: monospace;
      font-size: 20px;
      padding: 10px 30px;
      background: #333;
      color: #fff;
      border: 2px solid #888;
      cursor: pointer;
    }
    #overlay button:hover { background: #555; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="hp-bar-container">
      <div id="hp-bar-fill"></div>
      <div id="hp-bar-text"></div>
    </div>
    <span class="level" id="hud-level"></span>
    <span class="potions" id="hud-potions"></span>
    <span class="mode" id="hud-mode"></span>
  </div>
  <div id="messages"></div>
  <div id="overlay">
    <h1 id="overlay-title">Game Over</h1>
    <button id="restart-btn">Restart</button>
  </div>
  <script type="module">
    import { createGame, dispatch, getVisibleTiles, FLOOR, WALL, STAIR } from './src/game.js';
    import { GLYPHS, toggleRenderMode, getRenderMode } from './src/glyphs.js';

    const TILE_SIZE = 24;
    const FONT_SIZE = 22;
    const EMOJI_FONT = '"Segoe UI Emoji", "Noto Color Emoji", "Apple Color Emoji", monospace';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const messagesEl = document.getElementById('messages');
    const overlayEl = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const restartBtn = document.getElementById('restart-btn');
    const modeEl = document.getElementById('hud-mode');

    let game = createGame();
    let minimapVisible = true;

    // Refined color palette
    const WALL_SHADES = ['#3a3a4a', '#40405a', '#4a4a5a'];
    const FLOOR_SHADES = ['#1a1a1a', '#1c1c1c', '#1e1e1e'];

    const COLORS = {
      bg:      '#0a0a0a',
      player:  '#ffcc00',
      playerBg:'#44380a',
      stair:   '#5599dd',
      potion:  '#dd55cc',
    };

    const KEY_MAP = {
      ArrowUp:    'n', ArrowDown:  's', ArrowLeft:  'w', ArrowRight: 'e',
      w: 'n', W: 'n',
      s: 's', S: 's',
      a: 'w', A: 'w',
      d: 'e', D: 'e',
    };

    function getViewSize() {
      const cols = Math.floor((window.innerWidth - 40) / TILE_SIZE);
      const rows = Math.floor((window.innerHeight - 160) / TILE_SIZE);
      return { cols: Math.max(10, cols), rows: Math.max(6, rows) };
    }

    function scaleColor(hex, factor) {
      const r = Math.round(parseInt(hex.slice(1, 3), 16) * factor);
      const g = Math.round(parseInt(hex.slice(3, 5), 16) * factor);
      const b = Math.round(parseInt(hex.slice(5, 7), 16) * factor);
      return `rgb(${Math.min(255,r)},${Math.min(255,g)},${Math.min(255,b)})`;
    }

    function revealedColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const grey = (r + g + b) / 3;
      const rr = Math.round(grey * 0.15 + 20);
      const gg = Math.round(grey * 0.15 + 25);
      const bb = Math.round(grey * 0.2 + 40);
      return `rgb(${rr},${gg},${bb})`;
    }

    function wallShade(x, y) {
      return WALL_SHADES[(x * 7 + y * 13) % 3];
    }

    function floorShade(x, y) {
      return FLOOR_SHADES[(x * 7 + y * 13) % 3];
    }

    function render() {
      const { cols, rows } = getViewSize();
      canvas.width = cols * TILE_SIZE;
      canvas.height = rows * TILE_SIZE;

      const visible = getVisibleTiles(game, cols, rows);

      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      for (let vy = 0; vy < visible.length; vy++) {
        for (let vx = 0; vx < visible[vy].length; vx++) {
          const cell = visible[vy][vx];
          const px = vx * TILE_SIZE;
          const py = vy * TILE_SIZE;
          const cx = px + TILE_SIZE / 2;
          const cy = py + TILE_SIZE / 2;
          const mx = cell.x;
          const my = cell.y;

          if (cell.visibility === 'hidden') continue;

          if (cell.visibility === 'revealed') {
            if (cell.tile === WALL) {
              ctx.fillStyle = revealedColor(wallShade(mx, my));
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            } else if (cell.tile === STAIR) {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = revealedColor(COLORS.stair);
              ctx.fillText(GLYPHS.stair.char, cx, cy);
            } else if (cell.tile === FLOOR) {
              ctx.fillStyle = revealedColor(floorShade(mx, my));
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            }
            continue;
          }

          // Visible tiles — apply brightness scaling
          const b = cell.brightness;

          // Draw floor background for all visible floor tiles
          if (cell.tile === FLOOR || cell.tile === STAIR) {
            ctx.fillStyle = scaleColor(floorShade(mx, my), b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
          }

          if (cell.isPlayer) {
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.fillStyle = scaleColor(COLORS.playerBg, b);
            ctx.fillRect(px - 1, py - 1, TILE_SIZE + 2, TILE_SIZE + 2);
            ctx.fillStyle = scaleColor(COLORS.player, b);
            ctx.fillText(GLYPHS.player.char, cx, cy);
          } else if (cell.monster) {
            const glyph = GLYPHS[cell.monster.type];
            if (glyph && glyph.wide) {
              ctx.font = `${FONT_SIZE - 2}px ${EMOJI_FONT}`;
              ctx.fillText(glyph.char, cx, cy);
            } else {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = scaleColor(cell.monster.color, Math.min(1, b * 1.15));
              ctx.fillText((glyph || { char: cell.monster.char }).char, cx, cy);
            }
          } else if (cell.item) {
            const glyph = GLYPHS[cell.item.type];
            if (glyph && glyph.wide) {
              ctx.font = `${FONT_SIZE - 2}px ${EMOJI_FONT}`;
              ctx.fillText(glyph.char, cx, cy);
            } else {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = scaleColor(cell.item.color, b);
              ctx.fillText((glyph || { char: cell.item.char }).char, cx, cy);
            }
          } else if (cell.tile === WALL) {
            ctx.fillStyle = scaleColor(wallShade(mx, my), b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
          } else if (cell.tile === STAIR) {
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.fillStyle = scaleColor(COLORS.stair, b);
            ctx.fillText(GLYPHS.stair.char, cx, cy);
          }
        }
      }

      // Minimap overlay
      if (minimapVisible) {
        const mapW = game.map.width;
        const mapH = game.map.height;
        const margin = 10;
        const border = 1;
        const mmX = canvas.width - mapW - margin - border * 2;
        const mmY = margin;

        // Dark background with border
        ctx.fillStyle = '#111';
        ctx.fillRect(mmX - border, mmY - border, mapW + border * 2, mapH + border * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(mmX, mmY, mapW, mapH);

        for (let y = 0; y < mapH; y++) {
          for (let x = 0; x < mapW; x++) {
            if (!game.revealed[y][x]) continue;

            const inFOV = game.fov.has(`${x},${y}`);
            const tile = game.map.tiles[y][x];

            // Check for player
            if (x === game.player.x && y === game.player.y) {
              ctx.fillStyle = '#ffcc00';
            } else if (inFOV && game.monsters.some(m => m.x === x && m.y === y)) {
              ctx.fillStyle = '#cc3333';
            } else if (tile === STAIR) {
              ctx.fillStyle = '#5599dd';
            } else if (inFOV) {
              ctx.fillStyle = tile === WALL ? '#999' : '#555';
            } else {
              ctx.fillStyle = tile === WALL ? '#666' : '#333';
            }

            ctx.fillRect(mmX + x, mmY + y, 1, 1);
          }
        }
      }

      // HUD: HP bar
      const hp = game.player.hp;
      const maxHp = game.player.maxHp;
      const pct = maxHp > 0 ? hp / maxHp : 0;
      const hpFill = document.getElementById('hp-bar-fill');
      const hpText = document.getElementById('hp-bar-text');
      let barColor;
      if (pct > 0.6) barColor = '#44aa44';
      else if (pct > 0.3) barColor = '#ccaa22';
      else barColor = '#cc3333';
      hpFill.style.width = `${Math.round(pct * 100)}%`;
      hpFill.style.background = barColor;
      hpText.textContent = `${hp}/${maxHp}`;

      document.getElementById('hud-level').textContent = `Level: ${game.level}`;
      document.getElementById('hud-potions').textContent = `Potions: ${game.inventory.potions}`;
      modeEl.textContent = getRenderMode() === 'enhanced' ? '[emoji]' : '[ASCII]';

      // Messages with transparency fade
      const msgs = game.messages;
      let msgHtml = '';
      for (let i = 0; i < msgs.length; i++) {
        // newest message is last in array
        const age = msgs.length - 1 - i;
        const opacity = Math.max(0.4, 1.0 - age * 0.15);
        msgHtml += `<div class="msg-line" style="opacity:${opacity}">${msgs[i]}</div>`;
      }
      messagesEl.innerHTML = msgHtml;

      if (game.gameOver) {
        overlayTitle.textContent = 'Game Over';
        overlayTitle.className = 'game-over';
        overlayEl.classList.add('visible');
      } else if (game.won) {
        overlayTitle.textContent = 'You Win!';
        overlayTitle.className = 'win';
        overlayEl.classList.add('visible');
      } else {
        overlayEl.classList.remove('visible');
      }
    }

    document.addEventListener('keydown', (e) => {
      // Tab toggles minimap visibility
      if (e.key === 'Tab') {
        e.preventDefault();
        minimapVisible = !minimapVisible;
        render();
        return;
      }

      // 'm' toggles render mode (ASCII/emoji)
      if (e.key === 'm' || e.key === 'M') {
        e.preventDefault();
        toggleRenderMode();
        render();
        return;
      }

      if (game.gameOver || game.won) return;

      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        game = dispatch(game, { type: 'move', dir });
        render();
        return;
      }

      if (e.key === '.' || e.key === '>') {
        e.preventDefault();
        game = dispatch(game, { type: 'descend' });
        render();
        return;
      }

      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        game = dispatch(game, { type: 'usePotion' });
        render();
        return;
      }

      if (e.key === '5') {
        e.preventDefault();
        game = dispatch(game, { type: 'wait' });
        render();
      }
    });

    restartBtn.addEventListener('click', () => {
      game = dispatch(game, { type: 'restart' });
      render();
    });

    window.addEventListener('resize', render);
    render();
  </script>
</body>
</html>
