<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Roguelike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #aaa;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }
    canvas { display: block; image-rendering: pixelated; }
    #hud {
      margin-top: 8px;
      font-size: 16px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 8px 16px;
      border-top: 1px solid #222;
    }
    #hp-bar-container {
      position: relative;
      width: 160px;
      height: 18px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 2px;
      overflow: hidden;
    }
    #hp-bar-fill {
      height: 100%;
      transition: width 0.15s;
    }
    #hp-bar-text {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 2px #000, 0 0 4px #000;
    }
    #hud .level { color: #44aaff; font-weight: bold; }
    #hud .potions { color: #dd55cc; font-weight: bold; }
    #hud .equipment { color: #99bbdd; font-size: 13px; }
    #hud .mode { color: #888; font-size: 13px; }
    #messages {
      margin-top: 4px;
      font-size: 14px;
      text-align: left;
      width: 100%;
      max-width: 800px;
      padding: 0 20px;
      line-height: 1.4;
    }
    #messages .msg-line {
      color: #ccaa44;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }
    #overlay.visible { display: flex; }
    #overlay h1 { font-size: 48px; margin-bottom: 20px; }
    #overlay h1.game-over { color: #ff4444; }
    #overlay h1.win { color: #44ff44; }
    #overlay button {
      font-family: monospace;
      font-size: 20px;
      padding: 10px 30px;
      background: #333;
      color: #fff;
      border: 2px solid #888;
      cursor: pointer;
    }
    #overlay button:hover { background: #555; }

    /* Help overlay */
    #help-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.88);
      justify-content: center;
      align-items: center;
      z-index: 20;
    }
    #help-overlay.visible { display: flex; }
    #help-content {
      background: #1a1a2a;
      border: 1px solid #444;
      border-radius: 6px;
      padding: 24px 32px;
      max-width: 420px;
      width: 90%;
      font-family: monospace;
      color: #ccc;
    }
    #help-content h2 {
      color: #ffcc00;
      font-size: 18px;
      margin: 0 0 16px 0;
      text-align: center;
    }
    #help-content h3 {
      color: #44aaff;
      font-size: 14px;
      margin: 14px 0 6px 0;
    }
    #help-content h3:first-of-type { margin-top: 0; }
    .help-row {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 13px;
    }
    .help-key { color: #fff; }
    .help-desc { color: #999; }
    #help-content .help-dismiss {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #666;
    }

    /* First-load hint */
    #help-hint {
      display: none;
      position: fixed;
      bottom: 60px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.1);
      color: #aaa;
      font-family: monospace;
      font-size: 14px;
      padding: 6px 16px;
      border-radius: 4px;
      z-index: 5;
      pointer-events: none;
    }
    #help-hint.visible { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud">
    <div id="hp-bar-container">
      <div id="hp-bar-fill"></div>
      <div id="hp-bar-text"></div>
    </div>
    <span class="level" id="hud-level"></span>
    <span class="potions" id="hud-potions"></span>
    <span class="equipment" id="hud-equipment"></span>
    <span class="mode" id="hud-mode"></span>
    <button id="mute-btn" style="font-family:monospace;font-size:16px;background:none;border:1px solid #444;color:#888;cursor:pointer;padding:2px 8px;border-radius:3px" title="Toggle sound">&#x1f50a;</button>
    <button id="help-btn" style="font-family:monospace;font-size:16px;background:none;border:1px solid #444;color:#888;cursor:pointer;padding:2px 8px;border-radius:3px" title="Show controls help">?</button>
  </div>
  <div id="messages"></div>
  <div id="help-hint">Press ? for help</div>
  <div id="help-overlay">
    <div id="help-content">
      <h2>Controls</h2>
      <h3>Movement</h3>
      <div class="help-row"><span class="help-key">Arrow keys / WASD</span><span class="help-desc">Move</span></div>
      <h3>Actions</h3>
      <div class="help-row"><span class="help-key">P</span><span class="help-desc">Use potion</span></div>
      <div class="help-row"><span class="help-key">. or &gt;</span><span class="help-desc">Descend stairs</span></div>
      <div class="help-row"><span class="help-key">5</span><span class="help-desc">Wait a turn</span></div>
      <h3>Toggles</h3>
      <div class="help-row"><span class="help-key">Tab</span><span class="help-desc">Cycle render mode</span></div>
      <div class="help-row"><span class="help-key">M</span><span class="help-desc">Toggle minimap</span></div>
      <div class="help-row"><span class="help-key">N</span><span class="help-desc">Toggle sound</span></div>
      <div class="help-row"><span class="help-key">R</span><span class="help-desc">Restart game</span></div>
      <div class="help-dismiss">Press ? or Esc to close</div>
    </div>
  </div>
  <div id="overlay">
    <h1 id="overlay-title">Game Over</h1>
    <button id="restart-btn">Restart</button>
  </div>
  <script type="module">
    import { createGame, dispatch, getVisibleTiles, FLOOR, WALL, STAIR, EQUIPMENT_TYPES } from './src/game.js';
    import { GLYPHS, toggleRenderMode, getRenderMode } from './src/glyphs.js';
    import { initAudio, setVolume, getVolume, playMove, playAttack, playHurt, playPickup, playDescend, playDeath, playVictory } from './src/audio.js';

    const TILE_SIZE = 28;
    const FONT_SIZE = 22;
    const EMOJI_FONT = '"Segoe UI Emoji", "Noto Color Emoji", "Apple Color Emoji", monospace';
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const messagesEl = document.getElementById('messages');
    const overlayEl = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const restartBtn = document.getElementById('restart-btn');
    const modeEl = document.getElementById('hud-mode');

    let game = createGame();
    let minimapVisible = true;
    let helpVisible = false;
    const helpOverlay = document.getElementById('help-overlay');
    const helpBtn = document.getElementById('help-btn');
    const helpHintEl = document.getElementById('help-hint');

    function toggleHelp() {
      helpVisible = !helpVisible;
      helpOverlay.classList.toggle('visible', helpVisible);
    }

    // Help button click
    helpBtn.addEventListener('click', toggleHelp);

    // Dismiss help when clicking backdrop (outside help-content)
    helpOverlay.addEventListener('click', (e) => {
      if (e.target === helpOverlay) {
        helpVisible = false;
        helpOverlay.classList.remove('visible');
      }
    });

    // First-load hint
    if (!localStorage.getItem('sillyRoguelike.helpHintShown')) {
      helpHintEl.classList.add('visible');
      localStorage.setItem('sillyRoguelike.helpHintShown', '1');
      const dismissHint = () => {
        helpHintEl.classList.remove('visible');
        document.removeEventListener('keydown', dismissHint);
        document.removeEventListener('touchstart', dismissHint);
      };
      setTimeout(dismissHint, 4000);
      document.addEventListener('keydown', dismissHint);
      document.addEventListener('touchstart', dismissHint);
    }

    // Refined color palette
    const WALL_SHADES = ['#3a3a4a', '#40405a', '#4a4a5a'];
    const FLOOR_SHADES = ['#1a1a1a', '#1c1c1c', '#1e1e1e'];

    const COLORS = {
      bg:      '#0a0a0a',
      player:  '#ffcc00',
      playerBg:'#44380a',
      stair:   '#5599dd',
      potion:  '#dd55cc',
      dagger:  '#aaaaaa',
      sword:   '#dddddd',
      helmet:  '#88aacc',
      shield:  '#99bbdd',
    };

    const KEY_MAP = {
      ArrowUp:    'n', ArrowDown:  's', ArrowLeft:  'w', ArrowRight: 'e',
      w: 'n', W: 'n',
      s: 's', S: 's',
      a: 'w', A: 'w',
      d: 'e', D: 'e',
    };

    function getViewSize() {
      const cols = Math.floor((window.innerWidth - 40) / TILE_SIZE);
      const rows = Math.floor((window.innerHeight - 160) / TILE_SIZE);
      return { cols: Math.max(10, cols), rows: Math.max(6, rows) };
    }

    function scaleColor(hex, factor) {
      const r = Math.round(parseInt(hex.slice(1, 3), 16) * factor);
      const g = Math.round(parseInt(hex.slice(3, 5), 16) * factor);
      const b = Math.round(parseInt(hex.slice(5, 7), 16) * factor);
      return `rgb(${Math.min(255,r)},${Math.min(255,g)},${Math.min(255,b)})`;
    }

    function revealedColor(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      const grey = (r + g + b) / 3;
      const rr = Math.round(grey * 0.15 + 20);
      const gg = Math.round(grey * 0.15 + 25);
      const bb = Math.round(grey * 0.2 + 40);
      return `rgb(${rr},${gg},${bb})`;
    }

    function wallShade(x, y) {
      return WALL_SHADES[(x * 7 + y * 13) % 3];
    }

    function floorShade(x, y) {
      return FLOOR_SHADES[(x * 7 + y * 13) % 3];
    }

    function render() {
      const { cols, rows } = getViewSize();
      canvas.width = cols * TILE_SIZE;
      canvas.height = rows * TILE_SIZE;

      const visible = getVisibleTiles(game, cols, rows);

      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      for (let vy = 0; vy < visible.length; vy++) {
        for (let vx = 0; vx < visible[vy].length; vx++) {
          const cell = visible[vy][vx];
          const px = vx * TILE_SIZE;
          const py = vy * TILE_SIZE;
          const cx = px + TILE_SIZE / 2;
          const cy = py + TILE_SIZE / 2;
          const mx = cell.x;
          const my = cell.y;

          if (cell.visibility === 'hidden') continue;

          if (cell.visibility === 'revealed') {
            if (cell.tile === WALL) {
              ctx.fillStyle = revealedColor(wallShade(mx, my));
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            } else if (cell.tile === STAIR) {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = revealedColor(COLORS.stair);
              ctx.fillText(GLYPHS.stair.char, cx, cy);
            } else if (cell.tile === FLOOR) {
              ctx.fillStyle = revealedColor(floorShade(mx, my));
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            }
            continue;
          }

          // Visible tiles — apply brightness scaling
          const b = cell.brightness;

          // Draw floor background for all visible floor tiles
          if (cell.tile === FLOOR || cell.tile === STAIR) {
            ctx.fillStyle = scaleColor(floorShade(mx, my), b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
          }

          if (cell.isPlayer) {
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.fillStyle = scaleColor(COLORS.playerBg, b);
            ctx.fillRect(px - 1, py - 1, TILE_SIZE + 2, TILE_SIZE + 2);
            ctx.fillStyle = scaleColor(COLORS.player, b);
            ctx.fillText(GLYPHS.player.char, cx, cy);
          } else if (cell.monster) {
            const glyph = GLYPHS[cell.monster.type];
            if (glyph && glyph.wide) {
              ctx.font = `${FONT_SIZE - 2}px ${EMOJI_FONT}`;
              ctx.fillText(glyph.char, cx, cy);
            } else {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = scaleColor(cell.monster.color, Math.min(1, b * 1.15));
              ctx.fillText((glyph || { char: cell.monster.char }).char, cx, cy);
            }
          } else if (cell.item) {
            const glyph = GLYPHS[cell.item.type];
            if (glyph && glyph.wide) {
              ctx.font = `${FONT_SIZE - 2}px ${EMOJI_FONT}`;
              ctx.fillText(glyph.char, cx, cy);
            } else {
              ctx.font = `${FONT_SIZE}px monospace`;
              ctx.fillStyle = scaleColor(cell.item.color, b);
              ctx.fillText((glyph || { char: cell.item.char }).char, cx, cy);
            }
          } else if (cell.tile === WALL) {
            ctx.fillStyle = scaleColor(wallShade(mx, my), b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
          } else if (cell.tile === STAIR) {
            ctx.font = `${FONT_SIZE}px monospace`;
            ctx.fillStyle = scaleColor(COLORS.stair, b);
            ctx.fillText(GLYPHS.stair.char, cx, cy);
          }
        }
      }

      // Minimap overlay
      if (minimapVisible) {
        const MINIMAP_SCALE = 3;
        const mapW = game.map.width;
        const mapH = game.map.height;
        const scaledW = mapW * MINIMAP_SCALE;
        const scaledH = mapH * MINIMAP_SCALE;
        const margin = 10;
        const border = 1;
        const mmX = canvas.width - scaledW - margin - border * 2;
        const mmY = margin;

        // Dark background with border
        ctx.fillStyle = '#111';
        ctx.fillRect(mmX - border, mmY - border, scaledW + border * 2, scaledH + border * 2);
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(mmX, mmY, scaledW, scaledH);

        for (let y = 0; y < mapH; y++) {
          for (let x = 0; x < mapW; x++) {
            if (!game.revealed[y][x]) continue;

            const inFOV = game.fov.has(`${x},${y}`);
            const tile = game.map.tiles[y][x];

            // Check for player
            if (x === game.player.x && y === game.player.y) {
              ctx.fillStyle = '#ffcc00';
            } else if (inFOV && game.monsters.some(m => m.x === x && m.y === y)) {
              ctx.fillStyle = '#cc3333';
            } else if (tile === STAIR) {
              ctx.fillStyle = '#5599dd';
            } else if (inFOV) {
              ctx.fillStyle = tile === WALL ? '#999' : '#555';
            } else {
              ctx.fillStyle = tile === WALL ? '#666' : '#333';
            }

            ctx.fillRect(mmX + x * MINIMAP_SCALE, mmY + y * MINIMAP_SCALE, MINIMAP_SCALE, MINIMAP_SCALE);
          }
        }
      }

      // HUD: HP bar
      const hp = game.player.hp;
      const maxHp = game.player.maxHp;
      const pct = maxHp > 0 ? hp / maxHp : 0;
      const hpFill = document.getElementById('hp-bar-fill');
      const hpText = document.getElementById('hp-bar-text');
      let barColor;
      if (pct > 0.6) barColor = '#44aa44';
      else if (pct > 0.3) barColor = '#ccaa22';
      else barColor = '#cc3333';
      hpFill.style.width = `${Math.round(pct * 100)}%`;
      hpFill.style.background = barColor;
      hpText.textContent = `${hp}/${maxHp}`;

      document.getElementById('hud-level').textContent = `Level: ${game.level}`;
      document.getElementById('hud-potions').textContent = `Potions: ${game.inventory.potions}`;

      // Equipment HUD
      const eq = game.equipment;
      const eqParts = [];
      const weaponStr = eq.weapon ? `${eq.weapon.name} +${eq.weapon.bonus}atk` : '\u2014';
      const helmetStr = eq.helmet ? `${eq.helmet.name} +${eq.helmet.bonus}def` : '\u2014';
      const shieldStr = eq.shield ? `${eq.shield.name} +${eq.shield.bonus}def` : '\u2014';
      document.getElementById('hud-equipment').textContent =
        `Weapon: ${weaponStr} | Helmet: ${helmetStr} | Shield: ${shieldStr}`;

      modeEl.textContent = getRenderMode() === 'enhanced' ? '[emoji]' : '[ASCII]';

      // Messages with transparency fade
      const msgs = game.messages;
      let msgHtml = '';
      for (let i = 0; i < msgs.length; i++) {
        // newest message is last in array
        const age = msgs.length - 1 - i;
        const opacity = Math.max(0.4, 1.0 - age * 0.15);
        msgHtml += `<div class="msg-line" style="opacity:${opacity}">${msgs[i]}</div>`;
      }
      messagesEl.innerHTML = msgHtml;

      if (game.gameOver) {
        overlayTitle.textContent = 'Game Over';
        overlayTitle.className = 'game-over';
        overlayEl.classList.add('visible');
      } else if (game.won) {
        overlayTitle.textContent = 'You Win!';
        overlayTitle.className = 'win';
        overlayEl.classList.add('visible');
      } else {
        overlayEl.classList.remove('visible');
      }
    }

    let audioReady = false;

    function playAudioForDiff(oldGame, newGame) {
      if (!audioReady) return;
      if (newGame.won && !oldGame.won) { playVictory(); return; }
      if (newGame.gameOver && !oldGame.gameOver) { playDeath(); return; }
      if (newGame.level > oldGame.level) { playDescend(); return; }
      if (newGame.player.hp < oldGame.player.hp) playHurt();
      // Check if a monster lost HP (player attacked)
      if (newGame.level === oldGame.level) {
        const oldMonsters = new Map(oldGame.monsters.map(m => [m.id !== undefined ? m.id : `${m.x},${m.y}`, m]));
        for (const nm of newGame.monsters) {
          const key = nm.id !== undefined ? nm.id : `${nm.x},${nm.y}`;
          const om = oldMonsters.get(key);
          if (om && nm.hp < om.hp) { playAttack(); break; }
        }
        // Monster killed (fewer monsters) also counts as attack
        if (newGame.monsters.length < oldGame.monsters.length) playAttack();
      }
      if (newGame.inventory.potions > oldGame.inventory.potions ||
          (newGame.items && oldGame.items && newGame.items.length < oldGame.items.length)) {
        playPickup();
      }
      if (newGame.player.x !== oldGame.player.x || newGame.player.y !== oldGame.player.y) playMove();
    }

    function dispatchAndPlay(action) {
      const oldGame = game;
      game = dispatch(game, action);
      playAudioForDiff(oldGame, game);
      render();
    }

    document.addEventListener('keydown', (e) => {
      if (!audioReady) {
        initAudio();
        audioReady = true;
      }

      // Help overlay toggle
      if (e.key === '?' || e.key === 'h' || e.key === 'H') {
        e.preventDefault();
        toggleHelp();
        return;
      }
      if (e.key === 'Escape' && helpVisible) {
        e.preventDefault();
        helpVisible = false;
        helpOverlay.classList.remove('visible');
        return;
      }

      // While help is visible, suppress all other game input
      if (helpVisible) return;

      // Tab toggles render mode even during game over/win
      if (e.key === 'Tab') {
        e.preventDefault();
        toggleRenderMode();
        render();
        return;
      }

      // 'm' toggles minimap visibility
      if (e.key === 'm' || e.key === 'M') {
        e.preventDefault();
        minimapVisible = !minimapVisible;
        render();
        return;
      }

      // 'n' toggles sound mute/unmute
      if (e.key === 'n' || e.key === 'N') {
        e.preventDefault();
        if (getVolume() > 0) {
          savedVolume = getVolume();
          setVolume(0);
          muteBtn.textContent = '\u{1f507}';
        } else {
          setVolume(savedVolume);
          muteBtn.textContent = '\u{1f50a}';
        }
        return;
      }

      // 'r' restarts the game
      if (e.key === 'r' || e.key === 'R') {
        e.preventDefault();
        game = dispatch(game, { type: 'restart' });
        render();
        return;
      }

      if (game.gameOver || game.won) return;

      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        dispatchAndPlay({ type: 'move', dir });
        return;
      }

      if (e.key === '.' || e.key === '>') {
        e.preventDefault();
        dispatchAndPlay({ type: 'descend' });
        return;
      }

      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        dispatchAndPlay({ type: 'usePotion' });
        return;
      }

      if (e.key === '5') {
        e.preventDefault();
        dispatchAndPlay({ type: 'wait' });
      }
    });

    // Mute toggle
    const muteBtn = document.getElementById('mute-btn');
    let savedVolume = 0.5;
    muteBtn.addEventListener('click', () => {
      if (!audioReady) { initAudio(); audioReady = true; }
      if (getVolume() > 0) {
        savedVolume = getVolume();
        setVolume(0);
        muteBtn.textContent = '\u{1f507}';
      } else {
        setVolume(savedVolume);
        muteBtn.textContent = '\u{1f50a}';
      }
    });

    restartBtn.addEventListener('click', () => {
      game = dispatch(game, { type: 'restart' });
      render();
    });

    window.addEventListener('resize', render);
    render();
  </script>
</body>
</html>
