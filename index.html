<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silly Roguelike</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #aaa;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
    }
    canvas { display: block; image-rendering: pixelated; }
    #hud {
      margin-top: 8px;
      font-size: 16px;
      color: #888;
    }
    #hud .hp { color: #ff4444; font-weight: bold; }
    #hud .level { color: #44aaff; font-weight: bold; }
    #hud .potions { color: #ff44ff; font-weight: bold; }
    #messages {
      margin-top: 4px;
      font-size: 14px;
      color: #ccaa44;
      text-align: left;
      width: 100%;
      max-width: 800px;
      padding: 0 20px;
      line-height: 1.4;
    }
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      justify-content: center;
      align-items: center;
      flex-direction: column;
      z-index: 10;
    }
    #overlay.visible { display: flex; }
    #overlay h1 { font-size: 48px; margin-bottom: 20px; }
    #overlay h1.game-over { color: #ff4444; }
    #overlay h1.win { color: #44ff44; }
    #overlay button {
      font-family: monospace;
      font-size: 20px;
      padding: 10px 30px;
      background: #333;
      color: #fff;
      border: 2px solid #888;
      cursor: pointer;
    }
    #overlay button:hover { background: #555; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="hud"></div>
  <div id="messages"></div>
  <div id="overlay">
    <h1 id="overlay-title">Game Over</h1>
    <button id="restart-btn">Restart</button>
  </div>
  <script type="module">
    import { createGame, dispatch, getVisibleTiles, FLOOR, WALL, STAIR } from './src/game.js';

    const TILE_SIZE = 18;
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const hud = document.getElementById('hud');
    const messagesEl = document.getElementById('messages');
    const overlayEl = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const restartBtn = document.getElementById('restart-btn');

    let game = createGame();

    const COLORS = {
      bg:     '#000000',
      wall:   '#aaaaaa',
      floor:  '#225522',
      player: '#ffdd00',
      floorChar: '#33aa33',
      stair:  '#44aaff',
      potion: '#ff44ff',
    };

    const KEY_MAP = {
      ArrowUp:    'n', ArrowDown:  's', ArrowLeft:  'w', ArrowRight: 'e',
      w: 'n', W: 'n',
      s: 's', S: 's',
      a: 'w', A: 'w',
      d: 'e', D: 'e',
    };

    function getViewSize() {
      const cols = Math.floor((window.innerWidth - 40) / TILE_SIZE);
      const rows = Math.floor((window.innerHeight - 160) / TILE_SIZE);
      return { cols: Math.max(10, cols), rows: Math.max(6, rows) };
    }

    function render() {
      const { cols, rows } = getViewSize();
      canvas.width = cols * TILE_SIZE;
      canvas.height = rows * TILE_SIZE;

      const visible = getVisibleTiles(game, cols, rows);

      ctx.fillStyle = COLORS.bg;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.font = `${TILE_SIZE - 2}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      function scaleColor(hex, factor) {
        const r = Math.round(parseInt(hex.slice(1, 3), 16) * factor);
        const g = Math.round(parseInt(hex.slice(3, 5), 16) * factor);
        const b = Math.round(parseInt(hex.slice(5, 7), 16) * factor);
        return `rgb(${r},${g},${b})`;
      }

      function revealedColor(hex) {
        // Desaturated blue-grey tint at ~25% brightness
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        const grey = (r + g + b) / 3;
        // Blend toward blue-grey
        const rr = Math.round(grey * 0.15 + 20);
        const gg = Math.round(grey * 0.15 + 25);
        const bb = Math.round(grey * 0.2 + 40);
        return `rgb(${rr},${gg},${bb})`;
      }

      for (let vy = 0; vy < visible.length; vy++) {
        for (let vx = 0; vx < visible[vy].length; vx++) {
          const cell = visible[vy][vx];
          const px = vx * TILE_SIZE;
          const py = vy * TILE_SIZE;

          if (cell.visibility === 'hidden') continue; // pure black (bg)

          if (cell.visibility === 'revealed') {
            // Dim memory tiles — walls and floor only, no monsters/items
            if (cell.tile === WALL) {
              ctx.fillStyle = revealedColor('#333333');
              ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
              ctx.fillStyle = revealedColor(COLORS.wall);
              ctx.fillText('#', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
            } else if (cell.tile === STAIR) {
              ctx.fillStyle = revealedColor(COLORS.stair);
              ctx.fillText('>', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
            } else if (cell.tile === FLOOR) {
              ctx.fillStyle = revealedColor(COLORS.floorChar);
              ctx.fillText('.', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
            }
            continue;
          }

          // Visible tiles — apply brightness scaling
          const b = cell.brightness;
          if (cell.isPlayer) {
            ctx.fillStyle = scaleColor(COLORS.player, b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = '#000';
            ctx.fillText('@', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          } else if (cell.monster) {
            ctx.fillStyle = scaleColor(cell.monster.color, b);
            ctx.fillText(cell.monster.char, px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          } else if (cell.item) {
            ctx.fillStyle = scaleColor(cell.item.color, b);
            ctx.fillText(cell.item.char, px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          } else if (cell.tile === WALL) {
            ctx.fillStyle = scaleColor('#333333', b);
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
            ctx.fillStyle = scaleColor(COLORS.wall, b);
            ctx.fillText('#', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          } else if (cell.tile === STAIR) {
            ctx.fillStyle = scaleColor(COLORS.stair, b);
            ctx.fillText('>', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          } else if (cell.tile === FLOOR) {
            ctx.fillStyle = scaleColor(COLORS.floorChar, b);
            ctx.fillText('.', px + TILE_SIZE / 2, py + TILE_SIZE / 2);
          }
        }
      }

      hud.innerHTML = `<span class="hp">HP: ${game.player.hp}/${game.player.maxHp}</span>` +
        `  <span class="level">Level: ${game.level}</span>` +
        `  <span class="potions">Potions: ${game.inventory.potions}</span>`;
      messagesEl.textContent = game.messages.join('\n');

      if (game.gameOver) {
        overlayTitle.textContent = 'Game Over';
        overlayTitle.className = 'game-over';
        overlayEl.classList.add('visible');
      } else if (game.won) {
        overlayTitle.textContent = 'You Win!';
        overlayTitle.className = 'win';
        overlayEl.classList.add('visible');
      } else {
        overlayEl.classList.remove('visible');
      }
    }

    document.addEventListener('keydown', (e) => {
      if (game.gameOver || game.won) return;

      const dir = KEY_MAP[e.key];
      if (dir) {
        e.preventDefault();
        game = dispatch(game, { type: 'move', dir });
        render();
        return;
      }

      if (e.key === '.' || e.key === '>') {
        e.preventDefault();
        game = dispatch(game, { type: 'descend' });
        render();
        return;
      }

      if (e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        game = dispatch(game, { type: 'usePotion' });
        render();
        return;
      }

      if (e.key === '5') {
        e.preventDefault();
        game = dispatch(game, { type: 'wait' });
        render();
      }
    });

    restartBtn.addEventListener('click', () => {
      game = dispatch(game, { type: 'restart' });
      render();
    });

    window.addEventListener('resize', render);
    render();
  </script>
</body>
</html>
